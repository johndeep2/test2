name: gps_tracker
description: GPS Tracker - Ghi đường đi xuất Google Maps
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^11.0.0          # GPS chính xác, chạy nền
  flutter_background_service: ^5.0.5  # Chạy nền khi tắt màn hình
  shared_preferences: ^2.2.2   # Lưu settings & điểm GPS
  url_launcher: ^6.2.5         # Mở Google Maps
  permission_handler: ^11.3.0  # Xin quyền GPS
  wakelock_plus: ^1.2.1        # Giữ màn hình không tắt khi đang dùng

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
