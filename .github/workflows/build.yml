name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # Tạo project Flutter mới rồi copy code vào
      - name: Create Flutter project & inject code
        run: |
          flutter create --org com.gpstracker --project-name gps_tracker tmp_app
          cp -r lib/* tmp_app/lib/
          cp pubspec.yaml tmp_app/pubspec.yaml
          cp android/app/src/main/AndroidManifest.xml tmp_app/android/app/src/main/AndroidManifest.xml
          cd tmp_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: GPS-Tracker-APK
          path: tmp_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
